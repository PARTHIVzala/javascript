<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <header>
      <h1>Quiz</h1>
    </header>

    <div class="container">

      <main class="card">
        <div id="start-screen">
          <h2>Welcome!</h2>
          <p class="small">Quiz. 5 questions, timer per question.</p>
          <button class="btn" id="start-btn">Start Game</button>
        </div>

        <div id="play-screen" style="display:none">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px">
            <div>
              <div class="timer">Time left: <span id="timer">15</span>s</div>
              <div class="small">Question <span id="q-index">1</span> / <span id="q-total">5</span></div>
            </div>

          </div>

          <div class="question card" id="question-text">...</div>
          <div class="options" id="options"></div>

          <div style="margin-top:12px;display:flex;justify-content:space-between">
            <div class="small">Status: <span id="status">Ready</span></div>

            <div>
              <button class="btn" id="next-btn" style="display:none">Next</button>
              <button class="btn" id="restart-btn" style="display:none">Restart</button>
            </div>
          </div>
        </div>

      </main>

      <aside class="card">
        <h3>Prize Ladder</h3>
        <div class="ladder" id="prize-ladder"></div>
      </aside>

    </div>
  </div>
</body>
<script src="script.js"></script>

</html>
