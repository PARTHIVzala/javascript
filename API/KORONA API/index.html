<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVID API</title>

    <!-- ✅ Correct favicon -->
    <link rel="icon" href="images/covid19.jpg">

    <link rel="stylesheet" href="style.css">

    <!-- ✅ Chart.js CDN (VERY IMPORTANT) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <button class="toggle" onclick="toggleTheme()">🌙</button>

    <div class="bg-viruses">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="container">

        <img src="images/covid19.jpg" class="covid-img">

        <h1>🌍 COVID-19 Tracker</h1>

        <div class="search-box">
            <input id="countryInput" placeholder="Enter country (India, USA)">
            <button onclick="getData()">Search</button>
        </div>

        <div class="cards">
            <div class="card confirmed">
                <h2>Cases</h2>
                <p id="cases">-</p>
            </div>
            <div class="card recovered">
                <h2>Recovered</h2>
                <p id="recovered">-</p>
            </div>
            <div class="card deaths">
                <h2>Deaths</h2>
                <p id="deaths">-</p>
            </div>
        </div>

        <canvas id="covidChart"></canvas>

        <p id="updated" class="updated"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
