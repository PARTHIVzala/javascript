<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recipe Book</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
    <h2>🍽 Recipe Book</h2>
    <button id="addBtn">+ Add Recipe</button>
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Recipes</h3>
        <ul id="recipeList"></ul>
    </div>

    <!-- Main View -->
    <div class="content">
        <div class="card">
            <img id="viewImg" src="img/p.jpg">
            <h2 id="viewTitle">Pasta</h2>
            <p id="viewDesc">With Salad</p>
            <button id="editBtn">Edit</button>
        </div>
    </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Add Recipe</h3>

        <input type="text" id="title" placeholder="Recipe Name">
        <input type="text" id="desc" placeholder="Description">
        <input type="text" id="img" placeholder="Image URL">

        <div class="btns">
            <button id="saveBtn">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
