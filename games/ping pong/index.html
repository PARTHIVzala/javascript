<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ping Pong — HTML5 Canvas</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <header>
      <h1>Ping Pong — HTML5 Canvas</h1>
      <div class="controls">
        <button id="toggleMode" class="btn">Mode: Single Player</button>
        <button id="restart" class="btn">Restart</button>
        <button id="soundToggle" class="btn">Sound: On</button>
      </div>
    </header>

    <canvas id="game" width="800" height="480"></canvas>

    <div class="footer">
      <div class="hint">Controls — Left: W / S | Right: ↑ / ↓ | P: Pause</div>
      <div style="margin-left:auto">
        Left Score: <span id="leftScore" class="score">0</span> —
        Right Score: <span id="rightScore" class="score">0</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
